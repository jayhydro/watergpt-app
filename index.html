<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>WaterGPT — 14-Day Streamflow Forecast</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f6f8; --surface:#ffffff; --surface2:#f0f1f4; --border:#e0e2e8;
  --text:#1a1d27; --text2:#6b7085; --accent:#2563eb; --accent-light:#dbeafe;
  --green:#16a34a; --yellow:#ca8a04; --orange:#ea580c; --red:#dc2626;
  --font:'DM Sans',system-ui,sans-serif; --mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden;height:100vh}
#map{width:100%;height:100vh;z-index:1}

.topbar{
  position:absolute;z-index:800;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;background:rgba(255,255,255,0.88);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--border);pointer-events:none;
}
.topbar>*{pointer-events:auto}
.logo{display:flex;align-items:center;gap:9px}
.logo-icon{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#2563eb,#16a34a);display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:16px;height:16px}
.logo h1{font-size:16px;font-weight:700;letter-spacing:-0.3px}
.logo h1 span{color:var(--accent)}
.tmeta{display:flex;gap:10px;font-size:11px;color:var(--text2);font-family:var(--mono)}
.tmeta .tag{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 7px}

.lctrl{
  position:absolute;z-index:800;top:56px;left:12px;
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:8px 12px;font-size:12px;box-shadow:0 2px 12px rgba(0,0,0,0.08);
  display:flex;flex-direction:column;gap:4px;
}
.lctrl label{display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--text)}
.lctrl input{accent-color:var(--accent)}

.legend{
  position:absolute;z-index:800;bottom:24px;left:12px;
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:10px 14px;font-size:12px;box-shadow:0 2px 12px rgba(0,0,0,0.08);
}
.legend-t{font-weight:600;margin-bottom:5px;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2)}
.legend-i{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.legend-d{width:10px;height:10px;border-radius:50%;flex-shrink:0}

.statsbar{position:absolute;z-index:800;bottom:24px;right:12px;display:flex;gap:6px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 14px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,0.08)}
.stat-val{font-size:20px;font-weight:700;font-family:var(--mono)}
.stat-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-top:1px}

#loading{position:absolute;z-index:9999;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .4s}
#loading.hide{opacity:0;pointer-events:none}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#lt{font-size:13px;color:var(--text2);font-family:var(--mono)}

#panel{position:absolute;z-index:900;top:56px;right:12px;width:640px;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 6px 30px rgba(0,0,0,0.12);display:none;overflow:hidden}
#panel.open{display:block;animation:panelIn .2s ease-out}
@keyframes panelIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
.ph{display:flex;align-items:flex-start;justify-content:space-between;padding:12px 14px 8px;border-bottom:1px solid var(--border)}
.ph-t{font-size:14px;font-weight:600}
.ph-s{font-size:11px;color:var(--text2);margin-top:2px;font-family:var(--mono)}
.ph-x{width:26px;height:26px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;line-height:1;transition:background .15s}
.ph-x:hover{background:var(--border);color:var(--text)}
.pchips{display:flex;gap:5px;padding:8px 14px;flex-wrap:wrap}
.chip{font-size:11px;font-family:var(--mono);padding:2px 7px;border-radius:4px;background:var(--surface2);border:1px solid var(--border);color:var(--text)}
.chip.s-low{border-color:var(--green);color:var(--green)}
.chip.s-medium{border-color:var(--yellow);color:var(--yellow)}
.chip.s-high{border-color:var(--orange);color:var(--orange)}
.chip.s-very_high{border-color:var(--red);color:var(--red)}
#chart{width:100%;height:330px}
.pfoot{padding:6px 14px 10px;border-top:1px solid var(--border);font-size:10px;color:var(--text2);display:flex;justify-content:space-between}
.pfoot a{color:var(--accent);text-decoration:none}

.corr-bar{display:flex;align-items:center;gap:8px;padding:4px 14px 6px;font-size:11px;color:var(--text2)}
.corr-bar label{font-weight:500;white-space:nowrap}
.corr-bar select{font-family:var(--mono);font-size:11px;padding:2px 6px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text);cursor:pointer}

.toast{
  position:absolute;z-index:850;bottom:70px;left:50%;transform:translateX(-50%);
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:8px 16px;font-size:12px;color:var(--text2);font-family:var(--mono);
  box-shadow:0 2px 12px rgba(0,0,0,0.1);transition:opacity .3s;
}
.toast.hide{opacity:0;pointer-events:none}

.leaflet-popup-content-wrapper{border-radius:8px!important;box-shadow:0 3px 14px rgba(0,0,0,0.12)!important}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><div id="lt">Loading stations…</div></div>

<div class="topbar">
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M12 2v6l3-3M12 8l-3-3M5 12c0 4 3.5 8 7 8s7-4 7-8c0-2-1-3.5-2.5-5"/></svg></div>
    <h1>Water<span>GPT</span></h1>
  </div>
  <div class="tmeta">
    <span class="tag" id="tI">—</span>
    <span class="tag" id="tM">—</span>
    <span class="tag" id="tN">—</span>
  </div>
</div>

<div id="map"></div>

<div class="lctrl">
  <label><input type="checkbox" id="cbBasins" checked> Basins</label>
  <label><input type="checkbox" id="cbRivers" checked> Rivers</label>
  <label><input type="checkbox" id="cbHideNoData" checked> Hide no-data</label>
</div>

<div class="legend">
  <div class="legend-t">Flood Risk</div>
  <div class="legend-i"><div class="legend-d" style="background:var(--green)"></div> Low</div>
  <div class="legend-i"><div class="legend-d" style="background:var(--yellow)"></div> Medium</div>
  <div class="legend-i"><div class="legend-d" style="background:var(--orange)"></div> High</div>
  <div class="legend-i"><div class="legend-d" style="background:var(--red)"></div> Very High</div>
</div>
<div class="statsbar" id="statsbar"></div>

<div id="panel">
  <div class="ph">
    <div><div class="ph-t" id="pT">—</div><div class="ph-s" id="pS">—</div></div>
    <button class="ph-x" id="pX">✕</button>
  </div>
  <div class="pchips" id="pC"></div>
  <div class="corr-bar">
    <label>Correction:</label>
    <select id="corrSel">
      <option value="none">None (raw model)</option>
      <option value="taper">Taper Blending</option>
      <option value="mean_bias">Mean Bias</option>
      <option value="ar" selected>AR Error (recommended)</option>
    </select>
  </div>
  <div id="chart"></div>
  <div class="pfoot">
    <span>Research demo only — not for operational decisions.</span>
    <a href="https://waterdata.usgs.gov/nwis" target="_blank">USGS NWIS ↗</a>
  </div>
</div>

<div class="toast hide" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script>
// ══════════════════════════════════════════════════════════════
// CONFIG — change DATA_ROOT to full URL when deploying
// e.g. 'https://yourname.github.io/watergpt-app/data'
// ══════════════════════════════════════════════════════════════
const DATA_ROOT = 'data';

// ═══ State ═══
let fcData = null, stMeta = null, stNames = {}, basinIdx = {};
let echart = null, selMarker = null;
let basinsLayer = null, riverLayer = null, hlLayer = null, markerLayer = null;
let fcIdx = {};
let corrMethod = 'ar';   // current correction method
let curStation = null;    // current station data for redraw

const SC = { low: '#16a34a', medium: '#ca8a04', high: '#ea580c', very_high: '#dc2626' };
const SR = { low: 5, medium: 7, high: 9, very_high: 11 };

// ═══ Helpers ═══
function toast(msg, ms) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.remove('hide');
  if (ms) setTimeout(() => el.classList.add('hide'), ms);
}

async function load(name) {
  const r = await fetch(`${DATA_ROOT}/${name}`, { cache: 'no-store' });
  if (!r.ok) throw new Error(`${name}: HTTP ${r.status}`);
  return r.json();
}

// ═══ Map (canvas renderer for performance) ═══
const map = L.map('map', { preferCanvas: true, zoomControl: true }).setView([39.5, -98.35], 5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);

// River network
riverLayer = L.tileLayer(
  'https://tiles.arcgis.com/tiles/P3ePLMYs2RVChkJx/arcgis/rest/services/Esri_Hydro_Reference_Overlay/MapServer/tile/{z}/{y}/{x}',
  { maxZoom: 19, opacity: 0.5 }
).addTo(map);

// Highlight layer (single selected basin)
hlLayer = L.geoJSON(null, {
  style: () => ({ color: '#2563eb', weight: 2.5, opacity: 0.8, fillColor: '#2563eb', fillOpacity: 0.13 })
}).addTo(map);

// Layer toggles
document.getElementById('cbBasins').onchange = function () {
  this.checked ? basinsLayer && basinsLayer.addTo(map) : basinsLayer && map.removeLayer(basinsLayer);
};
document.getElementById('cbRivers').onchange = function () {
  this.checked ? riverLayer.addTo(map) : map.removeLayer(riverLayer);
};

// ══════════════════════════════════════════════
// Phase 1: stations + basins → render map fast
// ══════════════════════════════════════════════
async function initMap() {
  const lt = document.getElementById('lt');

  // Station names (optional, fire-and-forget)
  load('station_names.json').then(d => { stNames = d; }).catch(() => {});

  // Stations metadata
  lt.textContent = 'Loading stations…';
  stMeta = await load('stations.json');
  document.getElementById('tN').textContent = stMeta.n_stations + ' stations · CONUS';

  // Basins (non-blocking if missing)
  lt.textContent = 'Loading basin boundaries…';
  try {
    const gj = await load('basins_simplified.json');
    gj.features.forEach(f => { basinIdx[f.properties.station_id] = f; });
    basinsLayer = L.geoJSON(gj, {
      style: () => ({ color: '#2563eb', weight: 0.7, opacity: 0.3, fillColor: '#2563eb', fillOpacity: 0.03, interactive: false })
    }).addTo(map);
  } catch (e) { console.warn('Basins not loaded:', e); }

  // Markers (gray until forecast colors them)
  lt.textContent = 'Rendering markers…';
  await new Promise(r => setTimeout(r, 10));
  markerLayer = L.layerGroup().addTo(map);
  stMeta.stations.forEach((s, i) => {
    const m = L.circleMarker([s.latitude, s.longitude], {
      radius: 5, color: '#94a3b8', fillColor: '#94a3b8', fillOpacity: 0.5, weight: 1.2, opacity: 0.7
    }).addTo(markerLayer);
    m._wi = i;
    m._sid = s.station_id;
    const nm = stNames[s.station_id] || s.name || s.station_id;
    m.bindTooltip(nm, { direction: 'top', offset: [0, -5] });
    m.on('click', () => onMarkerClick(m));
  });

  document.getElementById('loading').classList.add('hide');

  // Phase 2
  loadForecast();
}

// ══════════════════════════════════════════════
// Phase 2: forecast (async, updates markers)
// ══════════════════════════════════════════════
async function loadForecast() {
  toast('Loading forecast data…');
  try {
    fcData = await load('forecast_latest.json');
  } catch (e) {
    toast('⚠ Forecast not loaded — charts unavailable', 5000);
    console.error(e);
    return;
  }

  // Index
  fcIdx = {};
  fcData.stations.forEach(s => { fcIdx[s.station_id] = s; });

  // Header
  const d = new Date(fcData.issue_time);
  document.getElementById('tI').textContent = 'Issued ' + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  document.getElementById('tM').textContent = fcData.model_version;

  // Color markers
  markerLayer.eachLayer(m => {
    const fc = fcIdx[m._sid];
    if (!fc) return;
    const c = SC[fc.status] || SC.low, r = SR[fc.status] || 5;
    m.setRadius(r);
    m.setStyle({ color: c, fillColor: c, fillOpacity: 0.65, weight: 1.5, opacity: 0.85 });
  });

  // Apply no-data filter
  applyNoDataFilter();
  document.getElementById('cbHideNoData').onchange = applyNoDataFilter;

  // Stats (only stations with history data)
  const cnt = { low: 0, medium: 0, high: 0, very_high: 0 };
  fcData.stations.forEach(s => { if (hasHistoryData(s)) cnt[s.status]++; });
  const sb = document.getElementById('statsbar');
  sb.innerHTML = '';
  [['very_high', 'Very High', '--red'], ['high', 'High', '--orange'], ['medium', 'Medium', '--yellow']].forEach(([k, l, c]) => {
    if (cnt[k] > 0) sb.innerHTML += `<div class="stat-card"><div class="stat-val" style="color:var(${c})">${cnt[k]}</div><div class="stat-label">${l}</div></div>`;
  });

  toast('Forecast loaded ✓', 2000);
}

// ═══ No-data filter ═══
function hasHistoryData(fc) {
  if (fc.has_history !== undefined) return fc.has_history;
  const h = fc.history_discharge_cms;
  if (!h || h.length === 0) return false;
  return h.some(v => v !== null && v !== undefined);
}

function applyNoDataFilter() {
  if (!fcData || !markerLayer) return;
  const hide = document.getElementById('cbHideNoData').checked;
  markerLayer.eachLayer(m => {
    const fc = fcIdx[m._sid];
    if (!fc) return;
    if (hide && !hasHistoryData(fc)) {
      m.setStyle({ opacity: 0, fillOpacity: 0 });
      m.off('click');
      m.unbindTooltip();
      m._hidden = true;
    } else if (m._hidden || !hide) {
      const c = SC[fc.status] || SC.low;
      m.setStyle({ opacity: 0.85, fillOpacity: 0.65, color: c, fillColor: c });
      if (m._hidden) {
        m.on('click', () => onMarkerClick(m));
        const nm = stNames[m._sid] || stMeta.stations[m._wi]?.name || m._sid;
        m.bindTooltip(nm, { direction: 'top', offset: [0, -5] });
        m._hidden = false;
      }
    }
  });
}

// ═══ Click ═══
function onMarkerClick(m) {
  const fc = fcData ? fcData.stations.find(s => s.station_id === m._sid) : null;
  const sm = stMeta.stations[m._wi];
  const name = stNames[m._sid] || sm.name || m._sid;
  if (!fc) { toast('Forecast data not yet loaded…', 2000); return; }
  openPanel(fc, m, name);
}

// ═══ Panel ═══
function openPanel(s, marker, name) {
  document.getElementById('pT').textContent = name;
  document.getElementById('pS').textContent = `${s.station_id} · ${s.latitude.toFixed(3)}°N ${Math.abs(s.longitude).toFixed(3)}°W · ${s.drainage_area_km2} km²`;
  const sl = s.status.replace('_', ' ').replace(/\b\w/g, c => c.toUpperCase());
  document.getElementById('pC').innerHTML = `
    <span class="chip s-${s.status}">${sl} Risk</span>
    <span class="chip">P(warn) ${(s.p_warning * 100).toFixed(0)}%</span>
    <span class="chip">P(danger) ${(s.p_danger * 100).toFixed(0)}%</span>
    <span class="chip">Peak ${s.peak_q50_cms.toFixed(0)} m³/s @ +${s.peak_hour}h</span>
    <span class="chip">⚠ ${s.warning_level_cms.toFixed(1)}</span>
    <span class="chip">🚨 ${s.danger_level_cms.toFixed(1)}</span>`;
  document.getElementById('panel').classList.add('open');

  if (selMarker) {
    const prev = fcData.stations.find(x => x.station_id === selMarker._sid);
    if (prev) selMarker.setStyle({ weight: 1.5, color: SC[prev.status] });
  }
  marker.setStyle({ weight: 3, color: '#2563eb' });
  selMarker = marker;

  hlLayer.clearLayers();
  const feat = basinIdx[s.station_id];
  if (feat) hlLayer.addData(feat);

  curStation = s;
  drawChart(s);
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  hlLayer.clearLayers();
  if (selMarker) {
    const prev = fcData ? fcData.stations.find(x => x.station_id === selMarker._sid) : null;
    if (prev) selMarker.setStyle({ weight: 1.5, color: SC[prev.status] });
    selMarker = null;
  }
  curStation = null;
}
document.getElementById('pX').onclick = closePanel;
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });
document.getElementById('corrSel').onchange = function () {
  corrMethod = this.value;
  if (curStation) drawChart(curStation);
};

// ═══ Chart ═══
function drawChart(s) {
  if (!echart) {
    echart = echarts.init(document.getElementById('chart'));
    window.addEventListener('resize', () => echart && echart.resize());
  }
  const base = new Date(fcData.issue_time).getTime();
  const hT = fcData.history_hours.map(h => base + h * 3.6e6);
  const oT = fcData.observed_hours.map(h => base + h * 3.6e6);
  const fT = fcData.lead_time_hours.map(h => base + h * 3.6e6);

  // Apply correction (clamp to zero — negative discharge is unphysical)
  const corr = (corrMethod !== 'none' && s.corrections && s.corrections[corrMethod])
    ? s.corrections[corrMethod] : null;
  const adj = (v, i) => v != null && corr && i < corr.length ? Math.max(0, v + corr[i]) : v;
  const q10 = s.discharge_q10_cms.map((v, i) => adj(v, i));
  const q50 = s.discharge_q50_cms.map((v, i) => adj(v, i));
  const q90 = s.discharge_q90_cms.map((v, i) => adj(v, i));

  echart.setOption({
    backgroundColor: 'transparent', animation: true, animationDuration: 300,
    tooltip: {
      trigger: 'axis', backgroundColor: '#fff', borderColor: '#e0e2e8',
      textStyle: { color: '#1a1d27', fontFamily: 'DM Sans', fontSize: 12 },
      formatter(ps) {
        const d = new Date(ps[0].axisValue);
        let h = `<div style="font-family:JetBrains Mono;font-size:10px;color:#6b7085;margin-bottom:3px">${d.toLocaleString()}</div>`;
        ps.forEach(p => {
          if (p.value[1] != null && p.seriesName[0] !== '_')
            h += `<div style="display:flex;align-items:center;gap:5px"><span style="width:7px;height:7px;border-radius:50%;background:${p.color};display:inline-block"></span>${p.seriesName}: <b>${p.value[1].toFixed(1)}</b> m³/s</div>`;
        }); return h;
      }
    },
    grid: { left: 54, right: 16, top: 32, bottom: 34 },
    xAxis: {
      type: 'time', axisLine: { lineStyle: { color: '#e0e2e8' } }, axisTick: { show: false },
      axisLabel: { color: '#6b7085', fontFamily: 'DM Sans', fontSize: 11,
        formatter: v => { const d = new Date(v); return (d.getMonth() + 1) + '/' + d.getDate(); } },
      splitLine: { show: false }
    },
    yAxis: {
      type: 'value', name: 'm³/s', nameTextStyle: { color: '#6b7085', fontSize: 11 },
      axisLine: { show: false }, axisTick: { show: false },
      axisLabel: { color: '#6b7085', fontFamily: 'JetBrains Mono', fontSize: 11 },
      splitLine: { lineStyle: { color: '#f0f1f4' } }, scale: true
    },
    dataZoom: [{ type: 'inside', xAxisIndex: 0 }],
    series: [
      { name: 'Observed (hist)', type: 'line', showSymbol: false,
        data: hT.map((t, i) => [t, s.history_discharge_cms[i]]),
        lineStyle: { color: '#60a5fa', width: 1.2 }, itemStyle: { color: '#60a5fa' }, z: 5 },
      { name: 'Observed (recent)', type: 'line', showSymbol: false,
        data: oT.map((t, i) => [t, s.observed_discharge_cms[i]]),
        lineStyle: { color: '#16a34a', width: 1.8, type: 'dashed' }, itemStyle: { color: '#16a34a' }, z: 6 },
      { name: '_base', type: 'line', showSymbol: false, stack: 'cf',
        data: fT.map((t, i) => [t, q10[i]]),
        lineStyle: { opacity: 0 }, areaStyle: { opacity: 0 }, itemStyle: { color: 'transparent' }, z: 2 },
      { name: 'P10–P90', type: 'line', showSymbol: false, stack: 'cf',
        data: fT.map((t, i) => [t, q90[i] - q10[i]]),
        lineStyle: { opacity: 0 }, areaStyle: { color: 'rgba(37,99,235,0.12)' },
        itemStyle: { color: 'rgba(37,99,235,0.25)' }, z: 2 },
      { name: 'Forecast (P50)', type: 'line', showSymbol: false,
        data: fT.map((t, i) => [t, q50[i]]),
        lineStyle: { color: '#2563eb', width: 2 }, itemStyle: { color: '#2563eb' }, z: 4,
        markLine: { silent: true, symbol: 'none',
          lineStyle: { color: '#9ca3af', type: 'solid', width: 1 },
          label: { show: true, formatter: 'Issue time', color: '#6b7085', fontSize: 10,
            fontFamily: 'DM Sans', position: 'insideStartTop' },
          data: [{ xAxis: base }] } },
      // Threshold lines: only show if peak flow reaches 20% of warning level
      // (otherwise they compress the hydrograph against x-axis)
      ...(() => {
        const allVals = [
          ...(s.history_discharge_cms || []),
          ...(s.observed_discharge_cms || []),
          ...q90
        ].filter(v => v != null && !isNaN(v));
        const peakFlow = allVals.length > 0 ? Math.max(...allVals) : 0;
        const series = [];
        if (peakFlow > s.warning_level_cms * 0.2) {
          series.push({ name: 'Warning (5-yr)', type: 'line', showSymbol: false,
            data: [[hT[0], s.warning_level_cms], [fT[fT.length - 1], s.warning_level_cms]],
            lineStyle: { color: '#ea580c', width: 1, type: 'dashed' }, itemStyle: { color: '#ea580c' }, z: 1,
            markPoint: { data: [{ coord: [fT[fT.length-1], s.warning_level_cms], value: 'Warning', symbolSize: 0 }],
              label: { show: true, formatter: '⚠ 5-yr', color: '#ea580c', fontSize: 10, position: 'left' } } });
        }
        if (peakFlow > s.danger_level_cms * 0.2) {
          series.push({ name: 'Danger (20-yr)', type: 'line', showSymbol: false,
            data: [[hT[0], s.danger_level_cms], [fT[fT.length - 1], s.danger_level_cms]],
            lineStyle: { color: '#dc2626', width: 1, type: 'dashed' }, itemStyle: { color: '#dc2626' }, z: 1,
            markPoint: { data: [{ coord: [fT[fT.length-1], s.danger_level_cms], value: 'Danger', symbolSize: 0 }],
              label: { show: true, formatter: '🚨 20-yr', color: '#dc2626', fontSize: 10, position: 'left' } } });
        }
        return series;
      })()
    ]
  }, true);
}

initMap().catch(err => {
  document.getElementById('lt').textContent = 'Error: ' + err;
  console.error(err);
});
